@if (visible) {
  <div
    class="panel"
    data-testid="dev-fab"
  >
    <button
      [attr.aria-expanded]="expanded()"
      (click)="toggle()"
      class="toggle"
      type="button"
      aria-label="Otwórz panel narzędzi deweloperskich"
      data-testid="dev-fab-toggle"
    >
      <a22-icon [name]="expanded() ? 'expand_more' : 'auto_fix_high'" />
      @if (expanded()) {
        <span>Dev tools</span>
      }
    </button>

    @if (expanded()) {
      <div class="actions">
        <a22-button
          (click)="fill('required')"
          variant="filled"
          icon="edit_note"
          testId="dev-fill-required"
          label="Tylko wymagane"
        />
        <a22-button
          (click)="fill('all')"
          variant="outlined"
          icon="auto_awesome"
          testId="dev-fill-all"
          label="Wszystkie pola"
        />
        <a22-button
          (click)="fill('max')"
          variant="outlined"
          icon="account_tree"
          testId="dev-fill-full-demo"
          label="Maksymalne zagnieżdżenia"
        />
      </div>
      <p class="meta">
        Wypełnia model formularza danymi demo (tylko localhost).
        @if (lastAction() !== '') {
          <br />
          Ostatnio:
          <strong>{{ lastAction() }}</strong>
        }
      </p>
    }
  </div>
}
