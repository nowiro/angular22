<div class="language-row">
  <a22-select
    [formField]="field().code"
    [options]="codes"
    class="col-md-5 col-12"
    [label]="'Język' | a22T"
    testId="language-code"
  />
  <a22-select
    [formField]="field().level"
    [options]="levels"
    class="col-md-5 col-12"
    [label]="'Poziom' | a22T"
    testId="language-level"
  />
  @if (removable()) {
    <div class="remove col-md-1 col-12">
      <a22-button
        (click)="remove.emit()"
        variant="icon"
        icon="delete"
        [ariaLabel]="'Usuń język' | a22T"
        testId="language-remove"
      />
    </div>
  }
</div>
