<mat-form-field
  appearance="outline"
  subscriptSizing="dynamic"
>
  <mat-label>{{ label() }}</mat-label>
  <mat-select
    [value]="value()"
    [disabled]="disabled()"
    [attr.data-testid]="testId() || null"
    (selectionChange)="onSelection($event.value)"
    (closed)="touched.set(true)"
  >
    @for (opt of options(); track opt.value) {
      <mat-option [value]="opt.value">{{ opt.label | a22T }}</mat-option>
    }
  </mat-select>
  @if (hint() !== '' && !showError()) {
    <mat-hint>{{ hint() }}</mat-hint>
  }
</mat-form-field>
<a22-field-error [errors]="showError() ? errors() : []" />
