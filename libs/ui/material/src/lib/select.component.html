<mat-form-field
  appearance="outline"
  subscriptSizing="dynamic"
>
  <mat-label>{{ label() }}</mat-label>
  <mat-select
    [value]="value()"
    [disabled]="disabled()"
    [required]="required()"
    [attr.aria-invalid]="showError()"
    [attr.aria-describedby]="showError() && errorId() ? errorId() : null"
    [attr.data-testid]="testId() || null"
    (selectionChange)="onSelection($event.value)"
    (closed)="touched.set(true)"
  >
    @for (opt of options(); track opt.value) {
      <mat-option
        [value]="opt.value"
        [attr.data-testid]="testId() ? testId() + '-opt-' + opt.value : null"
      >
        {{ opt.label | a22T }}
      </mat-option>
    }
  </mat-select>
  @if (hint() !== '' && !showError()) {
    <mat-hint>{{ hint() }}</mat-hint>
  }
</mat-form-field>
<a22-field-error
  [errorId]="errorId()"
  [errors]="showError() ? errors() : []"
/>
