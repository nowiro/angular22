<mat-form-field
  appearance="outline"
  subscriptSizing="dynamic"
>
  <mat-label>{{ label() }}</mat-label>
  <input
    [matDatepicker]="picker"
    [value]="value()"
    [disabled]="disabled()"
    [required]="required()"
    [attr.aria-invalid]="showError()"
    [attr.aria-describedby]="showError() && errorId() ? errorId() : null"
    [attr.data-testid]="testId() || null"
    (dateChange)="onDate($event.value ?? null)"
    (blur)="touched.set(true)"
    matInput
  />
  <mat-datepicker-toggle
    [for]="picker"
    [disabled]="disabled()"
    matIconSuffix
  />
  <mat-datepicker #picker />
  @if (hint() !== '' && !showError()) {
    <mat-hint>{{ hint() }}</mat-hint>
  }
</mat-form-field>
<a22-field-error
  [errorId]="errorId()"
  [errors]="showError() ? errors() : []"
/>
