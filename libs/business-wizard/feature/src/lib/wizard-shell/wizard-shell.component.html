<a22-toolbar>
  <a22-icon name="domain" />
  <span class="brand">Kreator danych firmy</span>
  <span class="spacer"></span>
  <a
    [routerLink]="dashboardLink"
    class="home-link"
    data-testid="topbar-home"
  >
    <a22-icon name="dashboard" />
    Pulpit
  </a>
</a22-toolbar>

<main class="page">
  <header class="intro">
    <p class="intro__eyebrow">Demo · Angular 22 Signal Forms</p>
    <h1 class="intro__title">Rejestracja firmy w 6 krokach</h1>
    <p class="intro__lead">
      Pokaz Signal Forms — model w
      <code>signal()</code>
      , walidacja w
      <code>schema()</code>
      , warunkowy KRS i zgody zależne od profilu, komponenty Material przez wrappery
      <code>FormValueControl</code>
      .
    </p>
  </header>

  <section
    class="shell-card"
    data-testid="wizard-shell"
  >
    <a22-wizard-stepper
      #stepper
      [selectedIndex]="selectedIndex()"
      (selectedIndexChange)="onStepChange($event)"
    >
      <ng-template a22Step="Dane firmy">
        <a22-step-basics />
        <div class="step-actions">
          <span></span>
          <a22-button
            (click)="stepper.next()"
            icon="arrow_forward"
            label="Dalej"
            testId="step-1-next"
          />
        </div>
      </ng-template>

      <ng-template a22Step="Kontakt">
        <a22-step-contact />
        <div class="step-actions">
          <a22-button
            (click)="stepper.previous()"
            variant="outlined"
            icon="arrow_back"
            label="Wstecz"
            testId="step-2-prev"
          />
          <a22-button
            (click)="stepper.next()"
            icon="arrow_forward"
            label="Dalej"
            testId="step-2-next"
          />
        </div>
      </ng-template>

      <ng-template a22Step="Profil">
        <a22-step-profile />
        <div class="step-actions">
          <a22-button
            (click)="stepper.previous()"
            variant="outlined"
            icon="arrow_back"
            label="Wstecz"
            testId="step-3-prev"
          />
          <a22-button
            (click)="stepper.next()"
            icon="arrow_forward"
            label="Dalej"
            testId="step-3-next"
          />
        </div>
      </ng-template>

      <ng-template a22Step="Reprezentanci">
        <a22-step-representatives />
        <div class="step-actions">
          <a22-button
            (click)="stepper.previous()"
            variant="outlined"
            icon="arrow_back"
            label="Wstecz"
            testId="step-4-prev"
          />
          <a22-button
            (click)="stepper.next()"
            icon="arrow_forward"
            label="Dalej"
            testId="step-4-next"
          />
        </div>
      </ng-template>

      <ng-template a22Step="Zgody">
        <a22-step-consents />
        <div class="step-actions">
          <a22-button
            (click)="stepper.previous()"
            variant="outlined"
            icon="arrow_back"
            label="Wstecz"
            testId="step-5-prev"
          />
          <a22-button
            (click)="stepper.next()"
            icon="arrow_forward"
            label="Dalej"
            testId="step-5-next"
          />
        </div>
      </ng-template>

      <ng-template a22Step="Podsumowanie">
        <a22-step-summary />
        <div class="step-actions">
          <a22-button
            (click)="stepper.previous()"
            variant="outlined"
            icon="arrow_back"
            label="Wstecz"
            testId="step-6-prev"
          />
          <span></span>
        </div>
      </ng-template>
    </a22-wizard-stepper>
  </section>
</main>
