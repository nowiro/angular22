<main
  class="page"
  data-testid="embed-page"
>
  <div class="bar">
    <a
      [routerLink]="homeLink"
      class="back"
      data-testid="embed-back"
    >
      <a22-icon name="arrow_back" />
      {{ 'Wróć do listy aplikacji' | a22T }}
    </a>
    <a
      [href]="standaloneUrl()"
      class="back"
      data-testid="embed-open-tab"
      target="_blank"
      rel="noopener"
    >
      <a22-icon name="open_in_new" />
      {{ 'Otwórz w nowej karcie' | a22T }}
    </a>
  </div>

  @defer (on immediate) {
    @if (statusView(); as view) {
      <ng-container *ngComponentOutlet="view; inputs: statusInputs()" />
    }
  } @loading {
    <a22-progress-spinner />
  }

  <div
    #host
    class="host"
    data-testid="embed-host"
  ></div>
</main>
