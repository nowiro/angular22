# Dependency overrides — pnpm reads these ONLY from pnpm-workspace.yaml (a flat
# "pnpm.overrides" key in package.json is silently ignored).
# uuid: GHSA-w5hq-g745-h8pq (dev-only path via webpack-dev-server>sockjs).
overrides:
  uuid: ^11.0.3
  whatwg-encoding: ^3.1.1
  # browserslist 4.28.3 is a broken npm publish (comment-stripped node.js corrupts
  # a regex). Pin to the fixed 4.28.4. Remove once the ecosystem moves past 4.28.3.
  browserslist: 4.28.4

# Native build scripts allow-list (pnpm 11+). Without this, pnpm warns at every
# install. We trust these packages — they ship native bindings (file watchers,
# esbuild binary, LMDB) or post-install codemods (nx).
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  # unrs-resolver: native bindings used by eslint-plugin-import-x for fast module
  # resolution. Trusted (Rust binary auto-fetched per platform).
  unrs-resolver: true

minimumReleaseAgeExclude:
  - keycloak-angular@22.0.0
  - "@vitest/coverage-v8@4.1.9"
  - "@vitest/expect@4.1.9"
  - "@vitest/mocker@4.1.9"
  - "@vitest/pretty-format@4.1.9"
  - "@vitest/runner@4.1.9"
  - "@vitest/snapshot@4.1.9"
  - "@vitest/spy@4.1.9"
  - "@vitest/utils@4.1.9"
  - eslint-plugin-unicorn@66.0.0
  - vitest@4.1.9
  - browserslist@4.28.4
  - "@playwright/test@1.61.1"
  - playwright-core@1.61.1
  - playwright@1.61.1
  - vite@8.1.0
